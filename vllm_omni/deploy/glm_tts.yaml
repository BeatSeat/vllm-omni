# GLM-TTS deploy: 2-stage AR → DiT flow-matching.
#
# Default mode is async-chunk streaming through SharedMemoryConnector.
# Stage 0 (AR LLM) streams speech token chunks to Stage 1 (DiT + vocoder)
# via the shared-memory connector. Stage 1 runs as LLM_GENERATION type
# to support chunk_transfer_adapter consumption.
#
# enforce_eager=true everywhere:
#   * Stage 0 (AR) — cudagraph not verified on this checkpoint.
#   * Stage 1 (DiT) — CUDA graphs don't work with dynamic flow-matching shapes.
#
# Verified on 1× A40 48GB (both stages share GPU 0).
async_chunk: true

connectors:
  glm_tts_shm:
    name: SharedMemoryConnector
    extra:
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 25
      codec_left_context_frames: 25

stages:
  - stage_id: 0
    max_num_seqs: 10
    gpu_memory_utilization: 0.3
    enforce_eager: true
    async_scheduling: false
    max_num_batched_tokens: 1024
    max_model_len: 8192
    devices: "0"
    output_connectors:
      to_stage_1: glm_tts_shm
    default_sampling_params:
      temperature: 1.0
      top_k: 25
      top_p: 0.8
      max_tokens: 4096
      min_tokens: 1
      seed: 42
      detokenize: false
    hf_overrides:
      sample_method: ras
      sampling_top_k: 25
      ras_top_p: 0.8
      ras_top_k: 25
      ras_win_size: 10
      ras_tau_r: 0.1
      min_token_text_ratio: 2.0
      max_token_text_ratio: 20.0

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.1
    enforce_eager: true
    max_model_len: 32768
    max_num_batched_tokens: 4096
    devices: "0"
    input_connectors:
      from_stage_0: glm_tts_shm
    default_sampling_params:
      max_tokens: 4096
    disable_hybrid_kv_cache_manager: true
    skip_mm_profiling: true
